<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💀 BUG XYZ - WA CRASH</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>💀 BUG XYZ</h1>
      <p class="sub">WA CRASH • DELAY • BAND • UI BLANK</p>
    </div>

    <div class="card">
      <div class="feature-grid">
        <div class="feature crash">🔥 CRASH ENGINE</div>
        <div class="feature delay">⏳ DELAY FACTORY</div>
        <div class="feature band">🌊 BAND GENERATOR</div>
        <div class="feature blank">👻 UI BLANKER</div>
      </div>

      <div class="input-group">
        <input type="text" id="targetInput" placeholder="Target URL / Number">
        <select id="modeSelect">
          <option value="all">💀 ALL MODE</option>
          <option value="crash">🔥 CRASH ONLY</option>
          <option value="delay">⏳ DELAY ONLY</option>
          <option value="band">🌊 BAND ONLY</option>
          <option value="blank">👻 BLANK ONLY</option>
        </select>
        <button id="attackBtn">⚡ EXECUTE BUG</button>
      </div>

      <div id="resultBox">
        <pre id="output">⚡ Ready to destroy...</pre>
      </div>

      <div class="stats">
        <span>💀 BUG XYZ v3.0</span>
        <span>👥 99K+ users</span>
        <span>✅ 100% WORK</span>
      </div>
    </div>

    <div class="footer">
      <p>Dilxz Official • 72 rb x ditonton • 2026</p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
